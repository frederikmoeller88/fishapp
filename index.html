<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Fisk i dag</title>
<style>
body { font-family: Arial; margin:0; padding:20px; background:#f8f8f8; }
h1 { text-align:center; }

table {
width:100%;
border-collapse:collapse;
background:white;
font-size:18px;
}
th, td {
padding:8px;
border-bottom:1px solid #ddd;
font-size:16px;
}
th { background:#eee; }

button, select, input {
width:100%;
padding:10px;
margin:5px 0;
font-size:16px;
}

.popup {
display:none;
position:fixed;
top:0; left:0; right:0; bottom:0;
background:rgba(0,0,0,0.7);
}

.popupContent {
background:white;
margin:20px auto;
padding:20px;
width:95%;
max-width:900px;
}

.grid {
display:grid;
grid-template-columns: 1fr 1fr 1fr;
gap:15px;
}

.listBox {
border:1px solid #ccc;
padding:10px;
max-height:250px;
overflow:auto;
}

.item {
display:flex;
justify-content:space-between;
margin:5px 0;
}

.remove {
color:red;
cursor:pointer;
}

#addBtn { position:fixed; bottom:10px; left:10px; width:48%; }
#settingsBtn { position:fixed; bottom:10px; right:10px; width:48%; }

.deleteBtn {
background:transparent;
color:#d22;
border:none;
cursor:pointer;
font-size:18px;
transition:0.2s;
}

.deleteBtn:hover {
transform:scale(1.2);
color:#a00;
}

.editBtn {
background:transparent;
border:none;
cursor:pointer;
font-size:18px;
}

.saveBtn {
background:#2d7;
border:none;
border-radius:4px;
cursor:pointer;
font-size:16px;
padding:6px;
}

.cancelBtn {
background:#ddd;
border:none;
border-radius:4px;
cursor:pointer;
font-size:16px;
padding:6px;
}


th:nth-child(1), td:nth-child(1) { width: 25%; }
th:nth-child(2), td:nth-child(2) { width: 25%; }
th:nth-child(3), td:nth-child(3) { width: 25%; }

th:nth-child(4), td:nth-child(4),
th:nth-child(5), td:nth-child(5) {
 width: 1%;
 white-space: nowrap;
 text-align: right;
}

td:nth-child(4) { padding-right: 4px; }
td:nth-child(5) { padding-left: 4px; }


#settingsBtn.locked {
opacity:0.35;
filter:grayscale(100%);
}


.editBtn.locked,
.deleteBtn.locked {
opacity:0.35;
filter:grayscale(100%);
}

</style>
</head>
<body>

<h1>FISK I DAG</h1>

<table>
<tr>
<th>Fisk</th>
<th>Latin</th>
<th>Område</th>
<th>Redskab</th>
<th></th>
<th></th>
</tr>
<tbody id="list"></tbody>
</table>

<button id="addBtn" onclick="openAdd()">+ Tilføj</button>
<button id="settingsBtn" onclick="openSettings()">⚙️</button>


<div id="addPopup" class="popup">
<div class="popupContent">
<h2>Tilføj fisk</h2>

<select id="fish"></select>
<select id="area"></select>
<select id="tool"></select>

<button onclick="addFish()">Gem</button>
<button onclick="closeAdd()">Luk</button>

</div>
</div>

<div id="settingsPopup" class="popup">
<div class="popupContent">

<h2>Indstillinger</h2>

<div class="grid">

<div>
<h3>Fisketyper</h3>
<div id="fishListBox" class="listBox"></div>

<input id="newFishName" placeholder="Navn">
<input id="newFishLatin" placeholder="Latin">
<button onclick="addNewFish()">Tilføj</button>
</div>

<div>
<h3>Områder</h3>
<div id="areaListBox" class="listBox"></div>

<input id="newArea" placeholder="Nyt område">
<button onclick="addNewArea()">Tilføj</button>
</div>

<div>
<h3>Metoder</h3>
<div id="toolListBox" class="listBox"></div>

<input id="newTool" placeholder="Ny metode">
<button onclick="addNewTool()">Tilføj</button>
</div>

</div>

<button onclick="closeSettings()">Luk</button>

</div>
</div>

<script>
const APP_VERSION = "v9"; // ændr når du opdaterer
const PASSWORD = "1234";
let unlocked = false;

// Version check removed (no auto clear)

let fishList = JSON.parse(localStorage.getItem("fishList") || JSON.stringify([
"Torsk|Gadus morhua",
"Kuller|Melanogrammus aeglefinus",
"Sej|Pollachius virens",
"Lyssej|Pollachius pollachius",
"Hvilling|Merlangius merlangus",
"Kulmule|Merluccius merluccius",
"Lange|Molva molva",
"Brosme|Brosme brosme",
"Havtaske|Lophius piscatorius",
"Havkat|Anarhichas lupus",
"Makrel|Scomber scombrus",
"Hestemakrel|Trachurus trachurus",
"Sild|Clupea harengus",
"Brisling|Sprattus sprattus",
"Ansjos|Engraulis encrasicolus",
"Sardin|Sardina pilchardus",
"Rødspætte|Pleuronectes platessa",
"Ising|Limanda limanda",
"Skrubbe|Platichthys flesus",
"Søtunge|Solea solea",
"Pighvar|Scophthalmus maximus",
"Slethvar|Scophthalmus rhombus",
"Rødtunge|Microstomus kitt",
"Helleflynder|Hippoglossus hippoglossus",
"Grønlandsk hellefisk|Reinhardtius hippoglossoides",
"Rødfisk|Sebastes norvegicus",
"Laks|Salmo salar",
"Ørred|Salmo trutta",
"Regnbueørred|Oncorhynchus mykiss",
"Ål|Anguilla anguilla",
"Hornfisk|Belone belone",
"Stenbider|Cyclopterus lumpus",
"Fjæsing|Trachinus draco",
"Knurhane|Eutrigla gurnardus",
"Rokke|Raja spp.",
"Havbars|Dicentrarchus labrax",
"Dorade|Sparus aurata",
"Blåfinnet tun|Thunnus thynnus",
"Kammusling|Pecten maximus",
"Blåmusling|Mytilus edulis"
]));

let areas = JSON.parse(localStorage.getItem("areas") || JSON.stringify([
"27.I Barentshavet",
"27.IIa Norskehavet",
"27.IIb Svalbard og Bjørneøen",
"27.IIIa Skagerrak og Kattegat",
"27.IIIb Øresund",
"27.IIIc Bælthavet",
"27.IIId Østersøen",
"27.IVa Nordsøen nord",
"27.IVb Nordsøen central",
"27.IVc Nordsøen syd",
"27.Va Island",
"27.Vb Færøerne",
"27.VIa Vest for Skotland",
"27.VIb Rockall",
"27.VIIa Irskesøen",
"27.VIId Engelske Kanal øst",
"27.VIIe Engelske Kanal vest",
"27.VIIg Det Keltiske Hav",
"27.VIIIa Biscayen nord",
"27.XIV Østgrønland"
])); 
let tools = JSON.parse(localStorage.getItem("tools") || JSON.stringify([
"Line","Trawl","Garn"
]));

let data = JSON.parse(localStorage.getItem("fishData")||"{}");

function unlock(){
 let input = prompt("Indtast kode:");
 if(input === PASSWORD){
   unlocked = true;
   sessionStorage.setItem("unlocked","true");
   alert("Redigering aktiveret");
   applyLockState();
 } else {
   alert("Forkert kode");
 }
}

function applyLockState(){
 // Knapperne skal altid være synlige.
 // Koden spørges først, når man forsøger at redigere.
}

unlocked = sessionStorage.getItem("unlocked") === "true";

function updateLockUI(){
 let settingsBtn = document.getElementById("settingsBtn");
 if(settingsBtn){
   if(unlocked){
     settingsBtn.classList.remove("locked");
   } else {
     settingsBtn.classList.add("locked");
   }
 }

 let edits = document.querySelectorAll(".editBtn");
 let deletes = document.querySelectorAll(".deleteBtn");

 edits.forEach(el=>{
   if(unlocked){
     el.classList.remove("locked");
   } else {
     el.classList.add("locked");
   }
 });

 deletes.forEach(el=>{
   if(unlocked){
     el.classList.remove("locked");
   } else {
     el.classList.add("locked");
   }
 });
}

function refreshDropdowns(){
 let f=document.getElementById("fish");
 let a=document.getElementById("area");
 let t=document.getElementById("tool");

 f.innerHTML=""; a.innerHTML=""; t.innerHTML="";

 fishList.forEach(x=>{
  let o=document.createElement("option");
  o.value=x;
  o.textContent=x.split("|")[0];
  f.appendChild(o);
 });

 areas.forEach(x=>{
  let o=document.createElement("option");
  o.textContent=x;
  a.appendChild(o);
 });

 tools.forEach(x=>{
  let o=document.createElement("option");
  o.textContent=x;
  t.appendChild(o);
 });
}

function renderSettings(){

 let fb=document.getElementById("fishListBox");
 let ab=document.getElementById("areaListBox");
 let tb=document.getElementById("toolListBox");

 fb.innerHTML=""; ab.innerHTML=""; tb.innerHTML="";

 fishList.forEach(x=>{
  let name=x.split("|")[0];
  fb.innerHTML += `<div class="item">${name} <span class="remove" onclick="removeFish('${x}')">❌</span></div>`;
 });

 areas.forEach(x=>{
  ab.innerHTML += `<div class="item">${x} <span class="remove" onclick="removeArea('${x}')">❌</span></div>`;
 });

 tools.forEach(x=>{
  tb.innerHTML += `<div class="item">${x} <span class="remove" onclick="removeTool('${x}')">❌</span></div>`;
 });
}

function addFish(){
 if(!requireUnlock()) return;
 let fishValue = document.getElementById("fish").value;
 let fishParts = fishValue.split("|");
 let name = fishParts[0];
 let latin = fishParts[1];

 let area = document.getElementById("area").value;
 let tool = document.getElementById("tool").value;

 data[name] = {latin, area, tool, time:Date.now()};
 save();
 closeAdd();
}

function addNewFish(){
 if(!requireUnlock()) return;
 let n=document.getElementById("newFishName").value;
 let l=document.getElementById("newFishLatin").value;
 if(n && l){
  fishList.push(n+"|"+l);
  localStorage.setItem("fishList", JSON.stringify(fishList));
  document.getElementById("newFishName").value="";
  document.getElementById("newFishLatin").value="";
  refreshDropdowns();
  renderSettings();
 }
}

function addNewArea(){
 if(!requireUnlock()) return;
 let n=document.getElementById("newArea").value;
 if(n){
  areas.push(n);
  localStorage.setItem("areas", JSON.stringify(areas));
  document.getElementById("newArea").value="";
  refreshDropdowns();
  renderSettings();
 }
}

function addNewTool(){
 if(!requireUnlock()) return;
 let n=document.getElementById("newTool").value;
 if(n){
  tools.push(n);
  localStorage.setItem("tools", JSON.stringify(tools));
  document.getElementById("newTool").value="";
  refreshDropdowns();
  renderSettings();
 }
}

function removeFish(val){
 if(!requireUnlock()) return;
 fishList = fishList.filter(x=>x!==val);
 delete data[val.split("|")[0]];
 localStorage.setItem("fishList", JSON.stringify(fishList));
 save();
 refreshDropdowns();
 renderSettings();
}

function removeArea(val){
 if(!requireUnlock()) return;
 areas = areas.filter(x=>x!==val);
 localStorage.setItem("areas", JSON.stringify(areas));
 refreshDropdowns();
 renderSettings();
}

function removeTool(val){
 if(!requireUnlock()) return;
 tools = tools.filter(x=>x!==val);
 localStorage.setItem("tools", JSON.stringify(tools));
 refreshDropdowns();
 renderSettings();
}

function removeFromMainList(name){
 if(!requireUnlock()) return;
 delete data[name];
 localStorage.setItem("fishData", JSON.stringify(data));
 render();
updateLockUI();
}

function save(){
 localStorage.setItem("fishData", JSON.stringify(data));
 render();
updateLockUI();
}


function escapeHtml(str){
 return String(str).replace(/[&<>"']/g, function(m){
  return ({
   '&':'&amp;',
   '<':'&lt;',
   '>':'&gt;',
   '"':'&quot;',
   "'":'&#039;'
  })[m];
 });
}

function makeOptions(list, selected, mode){
 return list.map(x=>{
  let value = x;
  let label = x;

  if(mode === "fish"){
   let parts = x.split("|");
   label = parts[0];
   value = x;
  }

  let sel = value === selected ? "selected" : "";
  return `<option value="${escapeHtml(value)}" ${sel}>${escapeHtml(label)}</option>`;
 }).join("");
}

function editMainRow(name){
 if(!requireUnlock()) return;

 let item = data[name];
 if(!item) return;

 let currentFishValue = name + "|" + item.latin;

 let row = document.getElementById("row_" + safeId(name));
 if(!row) return;

 row.innerHTML = `
   <td>
    <select id="editFish_${safeId(name)}">
     ${makeOptions(fishList, currentFishValue, "fish")}
    </select>
   </td>
   <td>${escapeHtml(item.latin)}</td>
   <td>
    <select id="editArea_${safeId(name)}">
     ${makeOptions(areas, item.area, "area")}
    </select>
   </td>
   <td>
    <select id="editTool_${safeId(name)}">
     ${makeOptions(tools, item.tool, "tool")}
    </select>
   </td>
   <td><button class="saveBtn" onclick="saveMainEdit(decodeURIComponent('${jsString(name)}'))">Gem</button></td>
   <td><button class="cancelBtn" onclick="render()">Annuller</button></td>
 `;
}

function saveMainEdit(oldName){
 if(!requireUnlock()) return;

 let fishValue = document.getElementById("editFish_" + safeId(oldName)).value;
 let fishParts = fishValue.split("|");
 let newName = fishParts[0];
 let newLatin = fishParts[1];

 let newArea = document.getElementById("editArea_" + safeId(oldName)).value;
 let newTool = document.getElementById("editTool_" + safeId(oldName)).value;

 let oldItem = data[oldName];
 let oldTime = oldItem ? oldItem.time : Date.now();

 if(oldName !== newName){
  delete data[oldName];
 }

 data[newName] = {
  latin: newLatin,
  area: newArea,
  tool: newTool,
  time: oldTime
 };

 localStorage.setItem("fishData", JSON.stringify(data));
 render();
updateLockUI();
}

function jsString(str){
 return encodeURIComponent(String(str));
}

function safeId(str){
 return String(str).replace(/[^a-zA-Z0-9]/g, "_");
}

function render(){
 let now=Date.now();
 let html="";

 for(let k in data){
  if(now - data[k].time < 7*24*60*60*1000){
   html += `<tr id="row_${safeId(k)}">
   <td><b>${escapeHtml(k)}</b></td>
   <td>${escapeHtml(data[k].latin)}</td>
   <td>${escapeHtml(data[k].area)}</td>
   <td>${escapeHtml(data[k].tool)}</td>
   <td><span class="editBtn" onclick="editMainRow(decodeURIComponent('${jsString(k)}'))">✏️</span></td>
   <td><span class="deleteBtn" onclick="removeFromMainList(decodeURIComponent('${jsString(k)}'))">❌</span></td>
   </tr>`;
  }
 }

 document.getElementById("list").innerHTML=html;
 applyLockState();
}

function requireUnlock(){
 if(!unlocked){
   let input = prompt("For redigering tast kode:");
   if(input === PASSWORD){
     unlocked = true;
     sessionStorage.setItem("unlocked","true");
     updateLockUI();
     return true;
   } else {
     alert("Forkert kode");
     return false;
   }
 }
 return true;
}

function openAdd(){
 if(!requireUnlock()) return;
 document.getElementById("addPopup").style.display="block";
}
function closeAdd(){ document.getElementById("addPopup").style.display="none"; }

function openSettings(){
 if(!requireUnlock()) return;
 document.getElementById("settingsPopup").style.display="block";
 renderSettings();
}
function closeSettings(){ document.getElementById("settingsPopup").style.display="none"; }

refreshDropdowns();
render();
updateLockUI();
updateLockUI();

</script>

</body>
</html>
